name: Firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**', '.github/workflows/firmware.yml']
  pull_request:
    paths: ['firmware/**', '.github/workflows/firmware.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('firmware/platformio.ini') }}
      - run: pip install platformio
      - run: cp include/config.example.h include/config.h
        working-directory: firmware
      - run: platformio run
        working-directory: firmware
